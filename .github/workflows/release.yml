name: Release

# タグ v* を push するとビルド → GitHub Release 添付 → tap formula 自動更新。
#
# 前提シークレット: HOMEBREW_TAP_TOKEN
#   Matuyuhi/homebrew-tools への書き込み権を持つ PAT
#   （fine-grained: その repo の Contents = Read and write）。
#   未設定なら update-tap はスキップ（Release までは作られる）。
#
# サードパーティ Action は供給網最小化のため公式 actions/checkout のみ。残りは gh / rustup / sed。

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-24.04
    steps:
      - name: Create the GitHub Release (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1 \
            || gh release create "$TAG" --repo "$REPO" --title "$TAG" --generate-notes --verify-tag

  build:
    needs: create-release
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # mac は arm ランナー1種で両 arch をビルド（x86_64 はクロス）。
          - { os: macos-26, target: aarch64-apple-darwin, asset: hush-aarch64-apple-darwin.tar.gz }
          - { os: macos-26, target: x86_64-apple-darwin, asset: hush-x86_64-apple-darwin.tar.gz }
          - { os: ubuntu-24.04, target: x86_64-unknown-linux-gnu, asset: hush-x86_64-linux.tar.gz }
          - { os: ubuntu-24.04-arm, target: aarch64-unknown-linux-gnu, asset: hush-aarch64-linux.tar.gz }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
          rustup target add ${{ matrix.target }}
          rustc --version

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        run: tar -C "target/${{ matrix.target }}/release" -czf "${{ matrix.asset }}" hush

      - name: Upload to release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" "${{ matrix.asset }}" --repo "$REPO" --clobber

  update-tap:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Generate formula from template and push to tap
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping tap update."
            echo "Release assets are published; update Matuyuhi/homebrew-tools/Formula/hush.rb manually."
            exit 0
          fi
          VER="${TAG#v}"

          mkdir dist && cd dist
          for a in hush-aarch64-apple-darwin hush-x86_64-apple-darwin hush-aarch64-linux hush-x86_64-linux; do
            gh release download "$TAG" --repo "$REPO" -p "$a.tar.gz"
          done
          MA="$(sha256sum hush-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)"
          MX="$(sha256sum hush-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)"
          LA="$(sha256sum hush-aarch64-linux.tar.gz | cut -d' ' -f1)"
          LX="$(sha256sum hush-x86_64-linux.tar.gz | cut -d' ' -f1)"
          cd ..

          # テンプレートのプレースホルダを実値に差し替える（値は hex / 数字ドットのみ）。
          cp packaging/homebrew/hush.rb formula.rb
          sed -i \
            -e "s/__VERSION__/${VER}/g" \
            -e "s/__SHA_MACOS_ARM__/${MA}/g" \
            -e "s/__SHA_MACOS_X86__/${MX}/g" \
            -e "s/__SHA_LINUX_ARM__/${LA}/g" \
            -e "s/__SHA_LINUX_X86__/${LX}/g" \
            formula.rb

          git clone --depth 1 "https://x-access-token:${TAP_TOKEN}@github.com/Matuyuhi/homebrew-tools.git" tap
          mkdir -p tap/Formula
          cp formula.rb tap/Formula/hush.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/hush.rb
          if git diff --cached --quiet; then
            echo "Formula unchanged; nothing to push."
          else
            git commit -m "hush ${VER}"
            git push
          fi
